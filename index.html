<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="talent-protocol-verification" content="0f889eb79f4544769a667829db6fb49e">
    <title>Base Pac-Man</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@farcaster/frame-sdk@0.0.17/dist/index.min.js"></script>
    <script src="https://unpkg.com/@thirdweb-dev/sdk@latest/dist/thirdweb-sdk.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Press Start 2P', cursive; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        #game-container { border: 4px solid #0052FF; position: relative; background: #000; box-shadow: 0 0 20px #0052FF; }
        canvas { display: block; }
        .btn-mint { background: #0052FF; font-size: 10px; cursor: pointer; transition: 0.2s; }
        .btn-mint:hover { background: #003db3; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="mb-4 text-[#facc15]">SCORE: <span id="score">0</span></div>
    
    <div id="game-container">
        <canvas id="gameCanvas" width="340" height="340"></canvas>
    </div>

    <div class="mt-6 w-[340px]">
        <button id="mintButton" class="btn-mint w-full py-4 rounded-lg font-bold shadow-lg uppercase">
            MINT SCORE NFT
        </button>
        <p class="text-[8px] mt-4 text-center text-gray-500 italic">Verified on Base Network</p>
    </div>

    <script>
        // --- SDK SETUP ---
        window.addEventListener('load', async () => {
            if (window.farcaster?.sdk) await window.farcaster.sdk.actions.ready();
        });

        const sdk = new ThirdwebSDK("base", { clientId: "c1fd1c7e41a57fd4f1776293db6fb49e" });

        document.getElementById("mintButton").onclick = async () => {
            const btn = document.getElementById("mintButton");
            btn.innerText = "CLAIMING...";
            try {
                const contract = await sdk.getContract("0xA0282E2E89868661643668866E5363e7cC");
                await contract.erc721.claim(1);
                btn.innerText = "SUCCESS!";
                btn.style.background = "#16a34a";
            } catch (e) {
                btn.innerText = "FAILED - RETRY";
                console.error(e);
            }
        };

        // --- REAL GAME ENGINE ---
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        let score = 0;
        let pos = { x: 50, y: 50, dir: 1 };

        function drawGame() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Temsili Labirent
            ctx.strokeStyle = "#0052FF";
            ctx.strokeRect(20, 20, 300, 300);
            ctx.strokeRect(100, 100, 140, 140);

            // Hareket Eden Pac-Man
            pos.x += pos.dir * 2;
            if (pos.x > 280 || pos.x < 50) pos.dir *= -1;

            ctx.fillStyle = "#facc15";
            ctx.beginPath();
            let mouth = Math.abs(Math.sin(Date.now() / 150)) * 0.2;
            ctx.arc(pos.x, 60, 15, (0.2 - mouth) * Math.PI, (1.8 + mouth) * Math.PI);
            ctx.lineTo(pos.x, 60);
            ctx.fill();

            // Skor Artışı
            score++;
            document.getElementById("score").innerText = score;
            requestAnimationFrame(drawGame);
        }
        drawGame();
    </script>
</body>
</html>
