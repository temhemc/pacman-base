<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Base Pac-Man | Professional Mini-App</title>
    
    <meta name="description" content="Play Base Pac-Man, a professional Farcaster Mini-App built on the Base network. Experience the retro classic re-imagined for the on-chain generation.">
    <meta name="talent-protocol-verification" content="606a99..." />

    <meta property="fc:frame" content="vNext" />
    <meta property="fc:frame:image" content="https://basekit.online/pacman-preview.png" />
    <meta property="fc:frame:button:1" content="Play Pac-Man" />
    <meta property="fc:frame:button:1:action" content="launch_frame" />
    <meta property="fc:frame:button:1:target" content="https://pacman-base.vercel.app" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@farcaster/miniapp-sdk@latest/dist/index.min.js"></script>
    
    <style>
        body { background: #000; overflow: hidden; touch-action: none; font-family: sans-serif; }
        canvas { border: 4px solid #0052FF; box-shadow: 0 0 20px #0052FF; border-radius: 8px; }
        .btn-control { background: rgba(0, 82, 255, 0.3); border: 1px solid #0052FF; padding: 20px; border-radius: 50%; color: white; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">

    <div class="text-white mb-4 text-2xl font-bold tracking-widest">SCORE: <span id="score">0</span></div>
    
    <canvas id="gameCanvas"></canvas>

    <div class="grid grid-cols-3 gap-2 mt-8">
        <div></div>
        <button onpointerdown="changeDir('up')" class="btn-control">▲</button>
        <div></div>
        <button onpointerdown="changeDir('left')" class="btn-control">◀</button>
        <button onpointerdown="changeDir('down')" class="btn-control">▼</button>
        <button onpointerdown="changeDir('right')" class="btn-control">▶</button>
    </div>

    <script>
        // Farcaster SDK Initializer
        window.addEventListener('load', () => {
            if (window.farcaster?.sdk) {
                window.farcaster.sdk.actions.ready();
            }
        });

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        
        canvas.width = 360;
        canvas.height = 360;

        let score = 0;
        let pacman = { x: 180, y: 180, size: 14, dir: 'right', speed: 2.5 };
        
        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw Pacman
            ctx.beginPath();
            ctx.arc(pacman.x, pacman.y, pacman.size, 0.2 * Math.PI, 1.8 * Math.PI);
            ctx.lineTo(pacman.x, pacman.y);
            ctx.fillStyle = "#FF0";
            ctx.fill();
            ctx.closePath();
            
            // Simple Logic & Movement
            if(pacman.dir === 'right') pacman.x += pacman.speed;
            if(pacman.dir === 'left') pacman.x -= pacman.speed;
            if(pacman.dir === 'up') pacman.y -= pacman.speed;
            if(pacman.dir === 'down') pacman.y += pacman.speed;

            // Screen Wrap
            if(pacman.x > canvas.width) pacman.x = 0;
            if(pacman.x < 0) pacman.x = canvas.width;
            if(pacman.y > canvas.height) pacman.y = 0;
            if(pacman.y < 0) pacman.y = canvas.height;
            
            requestAnimationFrame(draw);
        }

        function changeDir(d) { pacman.dir = d; }
        draw();
    </script>
</body>
</html>
